<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الهاتف العالمي - شبكة باي</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: sans-serif; background:#6A1B9A; color:white; text-align:center; padding:20px }
    .card { background:white; color:black; border-radius:15px; padding:20px; margin:15px auto; max-width:400px }
    button { background:#FFD700; border:none; padding:12px 25px; border-radius:10px; font-weight:bold; margin:5px; cursor:pointer }
    input { width:90%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:8px }
    .hidden { display:none }
  </style>
</head>
<body>
  <h1>📱 الهاتف العالمي</h1>
  <p>سجل دخولك بالـ Pi وادفع 0.001 Pi شهرياً</p>

  <div id="login" class="card">
    <button onclick="login()">تسجيل الدخول بـ Pi</button>
  </div>

  <div id="app" class="card hidden">
    <h3>مرحبا <span id="username"></span></h3>
    <p>اشتراكك ينتهي: <span id="subEnd"></span></p>
    <button onclick="renew()">تجديد الاشتراك 0.001 Pi</button>
    <hr>
    <h4>إضافة جهة اتصال</h4>
    <input id="name" placeholder="الاسم">
    <input id="phone" placeholder="الرقم">
    <input id="country" placeholder="الدولة">
    <button onclick="addContact()">إضافة</button>
    <hr>
    <h4>جهات الاتصال</h4>
    <div id="contacts"></div>
  </div>

<script>
Pi.init({ version: "2.0" });
let uid = null;

async function login() {
  const auth = await Pi.authenticate(['username']);
  const res = await fetch('/api/pi-login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: auth.user.username, uid: auth.user.uid })
  });
  const data = await res.json();
  uid = auth.user.uid;
  document.getElementById('username').innerText = data.user;
  document.getElementById('subEnd').innerText = data.subscriptionEnd;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  loadContacts();
}

async function renew() {
  Pi.createPayment({ amount: 0.001, memo: "اشتراك شهري", metadata: { type: "sub" } }, {
    onReadyForServerApproval: async (paymentId) => {
      await fetch('/api/pi-approve', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentId, uid })
      });
    },
    onReadyForServerCompletion: async (paymentId, txid) => {
      await fetch('/api/pi-complete', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paymentId, txid, uid })
      });
      alert('تم التجديد!');
      location.reload();
    }
  });
}

async function addContact() {
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const country = document.getElementById('country').value;
  await fetch(`/api/contacts/${uid}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, phone, country })
  });
  loadContacts();
}

async function loadContacts() {
  const res = await fetch(`/api/contacts/${uid}`);
  const contacts = await res.json();
  document.getElementById('contacts').innerHTML = contacts.map(c => 
    `<p><b>${c.name}</b> - ${c.phone} - ${c.country}</p>`
  ).join('');
}
</script>
</body>
</html>
