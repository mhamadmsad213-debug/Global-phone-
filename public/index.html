<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Business Directory | دليل الشركات العالمي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #1e293b, #334155);
            padding: 60px 20px;
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { font-size: 1.2rem; opacity: 0.8; }
        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .search-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
        }
        .search-box input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: #334155;
            color: #fff;
        }
        .search-box button {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        .card h3 { color: #22d3ee; margin-bottom: 10px; }
        .card .country { color: #94a3b8; margin-bottom: 15px; }
        .footer { text-align: center; padding: 40px 20px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌍 دليل الشركات العالمي</h1>
        <p class="subtitle">اكتشف أفضل الشركات حول العالم</p>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" placeholder="ابحث عن شركة، دولة، مجال...">
            <button>بحث</button>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Tech Global Inc</h3>
                <div class="country">📍 أمريكا</div>
                <p>حلول البرمجيات والذكاء الاصطناعي للشركات الكبرى</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 دليل الشركات العالمي</p>
    </div>
</body>
</html>
