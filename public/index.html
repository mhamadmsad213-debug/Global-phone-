<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الهاتف العالمي - Pi Network</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
    button { background: #783A8C; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>مرحباً بك في تطبيق الهاتف العالمي</h1>
  <p>سجل دخولك باستخدام Pi Network</p>
  <button onclick="loginWithPi()">تسجيل الدخول بـ Pi</button>
  <p id="result" style="margin-top:20px; font-weight:bold;"></p>

  <script>
    const Pi = window.Pi;
    Pi.init({ version: "2.0" });
    
    function loginWithPi() {
      Pi.authenticate(['username', 'payments'])
        .then(function(auth) {
          document.getElementById('result').innerText = 'أهلاً ' + auth.user.username;
        })
        .catch(function(error) {
          document.getElementById('result').innerText = 'فشل تسجيل الدخول';
        });
    }
  </script>
</body>
</html>
